<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everspace Exhibits</title>
    <style>
        /* Reset default margins and set full height */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        /* Center content using CSS Flexbox */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fafafa;
            color: #2c3e50;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }

        /* Styling for the text */
        h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .email {
            font-size: 1.25rem;
            color: #576574;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .email:hover {
            color: #3498db;
        }
    </style>
</head>
<body>

    <div>
        <h1>Everspace Exhibits</h1>
        <a href="mailto:hello@everspaceexhibits.com" class="email">hello@everspaceexhibits.com</a>
    </div>

</body>
</html>
